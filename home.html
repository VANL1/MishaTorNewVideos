<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Чат</title>
</head>
<body>
    <!-- Основной контент страницы -->
    <div>
        <h1>Добро пожаловать на сайт!</h1>
        <p>Здесь любой контент вашей страницы</p>
    </div>

    <!-- Чат-виджет -->
    <div id="chatWidget" style="position:fixed; bottom:20px; right:20px; width:300px; background:white; border:1px solid #ccc;">
        
        <!-- Заголовок -->
        <div onclick="toggleChat()" style="background:#007bff; color:white; padding:10px;">
            <span>Общий чат</span>
            <span id="toggleIcon" style="float:right;">−</span>
        </div>
        
        <!-- Тело чата -->
        <div id="chatBody">
            <!-- Сообщения -->
            <div id="chatMessages" style="height:300px; overflow-y:auto; padding:10px;">
                {% for msg in messages %}
                    <div style="margin-bottom:10px; border-bottom:1px solid #eee;">
                        <b>{{ msg.username }}</b>
                        <small>{{ msg.created_at|date:"H:i" }}</small>
                        <p>{{ msg.message }}</p>
                    </div>
                {% empty %}
                    <p>Нет сообщений</p>
                {% endfor %}
            </div>
            
            <!-- Форма отправки -->
            <form id="chatForm">
                {% csrf_token %}
                <input type="text" id="username" value="Аноним" style="width:100%; margin-bottom:5px;">
                <textarea id="message" rows="2" style="width:100%; margin-bottom:5px;" required></textarea>
                <button type="submit">Отправить</button>
            </form>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <script>
        $(document).ready(function() {
            let lastMessageId = 0;
            
            // Функция сворачивания
            window.toggleChat = function() {
                let body = document.getElementById('chatBody');
                let icon = document.getElementById('toggleIcon');
                if (body.style.display === 'none') {
                    body.style.display = 'block';
                    icon.innerHTML = '−';
                } else {
                    body.style.display = 'none';
                    icon.innerHTML = '+';
                }
            };
            
            // Получение новых сообщений
            function updateMessages() {
                $.get('/get-messages/', { last_id: lastMessageId }, function(data) {
                    if (data.messages.length > 0) {
                        data.messages.forEach(function(msg) {
                            let messageHtml = '<div style="margin-bottom:10px; border-bottom:1px solid #eee;">' +
                                '<b>' + msg.username + '</b> ' +
                                '<small>' + msg.created_at + '</small>' +
                                '<p>' + msg.message + '</p>' +
                                '</div>';
                            $('#chatMessages').prepend(messageHtml);
                            
                            if (msg.id > lastMessageId) {
                                lastMessageId = msg.id;
                            }
                        });
                    }
                });
            }
            
            // Отправка сообщения
            $('#chatForm').on('submit', function(e) {
                e.preventDefault();
                
                $.post('/send-message/', {
                    username: $('#username').val() || 'Аноним',
                    message: $('#message').val(),
                    csrfmiddlewaretoken: '{{ csrf_token }}'
                }, function(data) {
                    if (data.success) {
                        $('#message').val('');
                        updateMessages();
                    }
                });
            });
            
            // Обновление каждые 3 секунды
            setInterval(updateMessages, 3000);
        });
    </script>
</body>
</html>
